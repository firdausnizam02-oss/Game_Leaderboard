# ============================================
# DOCKER COMPOSE CONFIGURATION
# ============================================
# This file defines all containers and how they work together
# docker-compose up starts everything with one command



services:
  # ---------- DATABASE SERVICE ----------
  database:
    image: mysql:8.0           # Use MySQL 8.0 image from Docker Hub
    container_name: app_db     # Name of the container (used by other containers)
    environment:               # Environment variables passed to container
      MYSQL_ROOT_PASSWORD: root123  # MySQL root password
      MYSQL_DATABASE: gameboard_db    # Auto-create this database
    volumes:
      - ./database:/docker-entrypoint-initdb.d  # ✅ MySQL auto-runs SQL files from this directory   # ← This auto-runs your SQL file
    networks:
      - app_net                # Attach to our custom network
    ports:
      - "3306:3306"            # Map host port 3306 to container port 3306
    # healthcheck:             # (Optional) ensures database is ready before others start
    #   test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
    #   timeout: 20s
    #   retries: 10

  # ---------- C SERVER SERVICE ----------
  c_server:
    build: ./c_server          # Build using Dockerfile in c_server folder
    container_name: c_server   # Name of the container
    networks:
      - app_net                # Same network as database
    depends_on:
      - database               # Wait for database to start first
    ports:                   # (Optional) uncomment to access from host
      - "8080:8080"          # Map host port 8080 to container port 8080

  # ---------- PYTHON SERVER SERVICE ----------
  python_server:
    build: ./python_server     # Build using Dockerfile in python_server folder
    container_name: python_server
    networks:
      - app_net
    depends_on:
      - database
    ports:
      - "8081:8081"          # Map host port 8081 to container port 8081

  # ---------- C CLIENT SERVICE ----------
  c_client:
    build: ./c_client          # Build using Dockerfile in c_client folder
    container_name: c_client
    networks:
      - app_net
    depends_on:
      - c_server               # Wait for C server to start first
    # This container will run once and exit (not a long-running service)

  # ---------- PYTHON CLIENT SERVICE ----------
  python_client:
    build: ./python_client     # Build using Dockerfile in python_client folder
    container_name: python_client
    networks:
      - app_net
    depends_on:
      - python_server          # Wait for Python server to start first
    # This container will run once and exit

# ---------- NETWORK DEFINITION ----------
networks:
  app_net:
    driver: bridge             # Default network driver for container communication
